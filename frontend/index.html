<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" co  ntent="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot Widget Demo</title>
  <link rel="preconnect" hrehf="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- Demo page background content -->
  <div class="demo-page">
    <div class="demo-content">
      <div class="demo-badge">Live Demo</div>
      <h1>Your Product.<br><span class="gradient-text">Supercharged with AI.</span></h1>
      <p>Click the chat button in the bottom-right corner to experience the chatbot widget.</p>
      <div class="demo-features">
        <div class="feature-pill">⚡ Instant Responses</div>
        <div class="feature-pill">🔒 Secure</div>
        <div class="feature-pill">🌐 Always Online</div>
      </div>
    </div>
  </div>

  <!-- ===== CHATBOT WIDGET ===== -->

  <!-- Floating Toggle Button -->
  <button class="chat-fab" id="chatFab" aria-label="Open chat">
    <span class="fab-icon fab-open">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="8.5" cy="10" r="1" fill="white"/>
        <circle cx="12" cy="10" r="1" fill="white"/>
        <circle cx="15.5" cy="10" r="1" fill="white"/>
      </svg>
    </span>
    <span class="fab-icon fab-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="fab-pulse"></span>
  </button>

  <!-- Chat Popup Window -->
  <div class="chat-popup" id="chatPopup" role="dialog" aria-label="AI Assistant chat window">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="8" width="18" height="13" rx="3" fill="url(#botGrad)"/>
            <circle cx="9" cy="14" r="2" fill="white" opacity="0.9"/>
            <circle cx="15" cy="14" r="2" fill="white" opacity="0.9"/>
            <rect x="8" y="4" width="8" height="5" rx="2" fill="url(#botGrad)"/>
            <circle cx="12" cy="4" r="1" fill="white" opacity="0.8"/>
            <defs>
              <linearGradient id="botGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-text">
          <span class="bot-name">AI Assistant</span>
          <span class="bot-status">
            <span class="status-dot"></span>
            Online
          </span>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="minimizeBtn" title="Minimize" aria-label="Minimize chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="header-btn close-btn" id="closeBtn" title="Close" aria-label="Close chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat Messages Area -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick Reply Chips -->
    <div class="quick-replies" id="quickReplies">
      <button class="chip" data-msg="What can you help me with?">What can you help with?</button>
      <button class="chip" data-msg="How do I get started?">Get started</button>
      <button class="chip" data-msg="Talk to a human agent">Talk to human</button>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Type your message…"
          rows="1"
          maxlength="500"
          aria-label="Message input"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="powered-by">Powered by <strong>Arvi AI</strong></span>
        <span class="char-count" id="charCount">0/500</span>
      </div>
    </div>
  </div>

  <script src="chatbot.js"></script>
</body>
</html>
